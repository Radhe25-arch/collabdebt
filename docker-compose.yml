version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codearena_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     codearena
      POSTGRES_PASSWORD: codearena_secret
      POSTGRES_DB:       codearena
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codearena"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codearena_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: codearena_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:         development
      PORT:             4000
      DATABASE_URL:     postgresql://codearena:codearena_secret@postgres:5432/codearena
      REDIS_URL:        redis://redis:6379
      JWT_ACCESS_SECRET:  change_me_access_secret_32chars_min
      JWT_REFRESH_SECRET: change_me_refresh_secret_32chars_min
      CLIENT_URL:       http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: codearena_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:
